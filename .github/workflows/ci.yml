name: CI

on:
  push:
    branches: [main]
  pull_request:

# Public repository: GitHub-hosted runners only (never self-hosted — fork PRs run arbitrary code).
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (unit)
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    name: E2E · standalone (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install Playwright (chromium)
        run: pnpm --filter processii-standalone exec playwright install --with-deps chromium

      - name: E2E
        run: pnpm --filter processii-standalone test:e2e
