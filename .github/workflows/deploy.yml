name: Deploy standalone (Firebase Hosting)

# Continuous deployment of the standalone P2P app to Firebase Hosting.
# Triggers on every main push that can affect the built site, or manually.
# Prerequisites (repository settings):
#   - variable FIREBASE_PROJECT_ID (the Firebase project id)
#   - secret FIREBASE_SERVICE_ACCOUNT_PROCESSII (service account JSON with
#     Hosting deploy rights — created via `firebase init hosting:github`)
on:
  push:
    branches: [main]
    paths:
      - 'packages/processii/**'
      - 'apps/standalone/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - 'turbo.json'
      - '.github/workflows/deploy.yml'
      # Docs-only merges must not deploy (CLAUDE.md/AGENTS.md). Exclude markdown
      # via a trailing negative pattern: GitHub does not allow a separate
      # `paths-ignore` alongside `paths`, and a later `!` pattern overrides the
      # earlier positives. A merge touching only *.md files then matches no
      # remaining path and the workflow does not run.
      - '!**/*.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-live
  cancel-in-progress: false

env:
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  deploy:
    # Gate: set the repository variable FIREBASE_DEPLOY_ENABLED to 'true' once the
    # FIREBASE_SERVICE_ACCOUNT_PROCESSII secret exists. Until then, runs are skipped
    # cleanly instead of failing red on main.
    if: vars.FIREBASE_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (package + standalone app)
        run: pnpm build

      - name: Deploy to Firebase Hosting (live)
        # SHA-pinned: this step receives the deploy service account (supply-chain hardening)
        uses: FirebaseExtended/action-hosting-deploy@500ac625ca2dd40cbd15f7659af953801858032a # v0.11.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROCESSII }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: live
          entryPoint: apps/standalone
